<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV H.264 스트리밍 (FPS 표시)</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
        }
        .container {
            text-align: center;
            max-width: 90%;
            display: none; /* 초기에는 숨김 */
        }
        /* 로그인 오버레이 스타일 */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #loginOverlay h2 {
            margin-bottom: 20px;
        }
        #loginOverlay input {
            padding: 10px;
            font-size: 1rem;
            border-radius: 4px;
            border: none;
            margin-bottom: 10px;
            width: 250px;
            background: #333;
            color: white;
            text-align: center;
        }
        #loginOverlay button {
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 4px;
            border: none;
            background-color: #00ff00;
            color: #000;
            cursor: pointer;
            font-weight: bold;
        }
        #loginOverlay button:hover {
            background-color: #00cc00;
        }
        .video-wrapper {
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        #videoElement {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .status {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 20px;
        }
        .highlight {
            color: #00ff00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <h2>IPTV 스트리밍 접속</h2>
        <input type="password" id="apiKeyInput" placeholder="API KEY 입력" onkeyup="if(event.keyCode==13) startStreaming()">
        <button onclick="startStreaming()">접속</button>
    </div>

    <div class="container" id="mainContainer">
        <h1>H.264 실시간 스트리밍</h1>
        <div class="video-wrapper">
            <video id="videoElement" controls autoplay muted></video>
        </div>
        <div id="status" class="status">
            상태: <span id="stateText">준비 중...</span> | 
            속도: <span id="speedText" class="highlight">0</span> KB/s | 
            현재 FPS: <span id="fpsText" class="highlight">0</span>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const stateText = document.getElementById('stateText');
        const speedText = document.getElementById('speedText');
        const fpsText = document.getElementById('fpsText');
        const loginOverlay = document.getElementById('loginOverlay');
        const mainContainer = document.getElementById('mainContainer');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // FPS 계산을 위한 변수
        let lastDecodedFrames = 0;
        let lastTime = performance.now();
        let player = null;

        async function startStreaming() {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert("API KEY를 입력해주세요.");
                return;
            }

            if (!mpegts.getFeatureList().mseLivePlayback) {
                alert('이 브라우저는 MSE를 지원하지 않습니다.');
                return;
            }

            try {
                // 1. API Key로 티켓 요청
                const response = await fetch('/auth', {
                    method: 'POST',
                    headers: {
                        'x-api-key': apiKey
                    }
                });

                if (!response.ok) {
                    throw new Error('인증 실패');
                }

                const data = await response.json();
                const ticket = data.ticket;

                // UI 전환
                loginOverlay.style.display = 'none';
                mainContainer.style.display = 'block';

                // 2. 티켓을 쿼리 파라미터로 사용하여 WebSocket 연결
                player = mpegts.createPlayer({
                    type: 'mse',
                    isLive: true,
                    url: 'ws://' + window.location.hostname + ':3000/ws?ticket=' + ticket
                }, {
                    enableStashBuffer: false,
                    liveBufferLatencyChasing: true,
                    liveBufferLatencyMaxLatency: 0.8,
                    liveBufferLatencyMinLatency: 0.2,
                    stashInitialSize: 32,
                });
                
                player.attachMediaElement(videoElement);
                player.load();
                player.play();

                // 지연 시간 관리
                setInterval(() => {
                    if (videoElement.buffered.length > 0) {
                        const end = videoElement.buffered.end(videoElement.buffered.length - 1);
                        const diff = end - videoElement.currentTime;
                        if (diff > 1.0) {
                            videoElement.currentTime = end - 0.2;
                        }
                    }
                }, 3000);

                // 통계 정보 수신 및 FPS 계산
                player.on(mpegts.Events.STATISTICS_INFO, (stat) => {
                    stateText.innerText = '재생 중';
                    speedText.innerText = Math.round(stat.speed);

                    if (videoElement.getVideoPlaybackQuality) {
                        const quality = videoElement.getVideoPlaybackQuality();
                        const currentTime = performance.now();
                        const frameDiff = quality.totalVideoFrames - lastDecodedFrames;
                        const timeDiff = (currentTime - lastTime) / 1000;

                        if (timeDiff >= 0.5) {
                            const currentFps = Math.round(frameDiff / timeDiff);
                            fpsText.innerText = currentFps;
                            lastDecodedFrames = quality.totalVideoFrames;
                            lastTime = currentTime;
                        }
                    }
                });

                player.on(mpegts.Events.ERROR, (type, detail, info) => {
                    console.error('Player error:', type, detail, info);
                    stateText.innerText = '오류: ' + detail;
                    stateText.style.color = '#ff4444';
                    
                    if (detail === 'NetworkError') {
                        alert("접속 실패 (연결 오류)");
                        location.reload();
                    }
                });

            } catch (error) {
                alert(error.message + " (API KEY를 확인하세요)");
                apiKeyInput.value = "";
                apiKeyInput.focus();
            }
        }
    </script>
</body>
</html>

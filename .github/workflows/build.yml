name: Release iptv

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Build Linux (amd64)
      run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -a -v -o iptv-linux main.go

    - name: Build Windows (x64)
      run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -a -v -o iptv-windows-x64.exe main.go

    - name: Build Windows (x86)
      run: CGO_ENABLED=0 GOOS=windows GOARCH=386 go build -a -v -o iptv-windows-x86.exe main.go

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          iptv-linux
          iptv-windows-x64.exe
          iptv-windows-x86.exe
          index.html
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}